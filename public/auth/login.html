<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anmelden · Fotowand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f1e8;
        --ink: #2a2623;
        --ink-soft: #6b625b;
        --accent: #8a6a3b;
        --accent-deep: #5e4826;
        --line: #d9cfbd;
        --ok: #4a7a4a;
        --err: #a33a3a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg); color: var(--ink);
        font-family: 'Inter', system-ui, sans-serif;
        min-height: 100vh;
      }
      body {
        display: grid; place-items: center;
        padding: 40px 20px;
        background-image:
          radial-gradient(ellipse at top, rgba(255, 250, 240, 0.7), transparent 60%),
          radial-gradient(ellipse at bottom right, rgba(138, 106, 59, 0.08), transparent 50%);
      }
      .card {
        max-width: 440px; width: 100%;
        background: #fdfaf4;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 34px 30px;
        box-shadow: 0 20px 50px -30px rgba(94, 72, 38, 0.35);
      }
      h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: 32px;
        margin: 0 0 6px;
        text-align: center;
      }
      .sub {
        text-align: center;
        color: var(--ink-soft);
        font-size: 14px;
        margin-bottom: 24px;
      }
      label {
        display: block;
        font-size: 13px; font-weight: 500;
        margin-bottom: 6px;
      }
      input[type='email'] {
        width: 100%;
        background: #fffdf7;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
        font-family: inherit;
        font-size: 16px;
        color: var(--ink);
      }
      input[type='email']:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(138, 106, 59, 0.15);
      }
      button {
        width: 100%;
        margin-top: 16px;
        padding: 14px;
        background: var(--accent-deep);
        color: #fdfaf4;
        border: none;
        border-radius: 12px;
        font-family: 'Cormorant Garamond', serif;
        font-size: 19px;
        letter-spacing: 0.04em;
        cursor: pointer;
      }
      button:hover:not(:disabled) { background: #4a3820; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .status {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
      }
      .status.show { display: block; }
      .status.ok {
        background: rgba(74, 122, 74, 0.12);
        color: var(--ok);
        border: 1px solid rgba(74, 122, 74, 0.25);
      }
      .status.err {
        background: rgba(163, 58, 58, 0.1);
        color: var(--err);
        border: 1px solid rgba(163, 58, 58, 0.25);
      }
      .foot {
        margin-top: 22px;
        text-align: center;
        font-size: 12px;
        color: var(--ink-soft);
      }
      .foot a {
        color: var(--accent-deep);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Willkommen zurück</h1>
      <div class="sub">Gib deine E-Mail ein — wir schicken dir einen Login-Link.</div>
      <form id="form">
        <label for="email">E-Mail</label>
        <input id="email" type="email" required autocomplete="email" placeholder="name@domain.de" />
        <button type="submit" id="btn">Login-Link senden</button>
      </form>
      <div class="status" id="status"></div>
      <div class="foot">
        Noch kein Konto? Einfach E-Mail eingeben — es wird automatisch angelegt.<br /><br />
        <a href="/">Zurück zur Startseite</a>
      </div>
    </div>

    <script>
      const form = document.getElementById('form');
      const btn = document.getElementById('btn');
      const statusEl = document.getElementById('status');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        if (!email) return;
        btn.disabled = true;
        btn.textContent = 'Sende…';
        statusEl.className = 'status';
        try {
          const res = await fetch('/api/auth/magic-link', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Unbekannter Fehler');
          statusEl.className = 'status show ok';
          statusEl.textContent = 'Check dein Postfach — der Login-Link ist unterwegs.';
          btn.textContent = 'Gesendet ✓';
        } catch (err) {
          statusEl.className = 'status show err';
          statusEl.textContent = err.message;
          btn.disabled = false;
          btn.textContent = 'Login-Link senden';
        }
      });
    </script>
  </body>
</html>
