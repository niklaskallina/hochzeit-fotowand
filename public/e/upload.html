<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Foto hochladen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f1e8;
        --bg-2: #efe6d4;
        --ink: #2a2623;
        --ink-soft: #6b625b;
        --accent: #8a6a3b;
        --accent-deep: #5e4826;
        --line: #d9cfbd;
        --ok: #4a7a4a;
        --err: #a33a3a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        background-image:
          radial-gradient(ellipse at top, rgba(255, 250, 240, 0.6), transparent 60%),
          radial-gradient(ellipse at bottom right, rgba(138, 106, 59, 0.08), transparent 50%);
        padding: 28px 22px 48px;
      }
      .frame { max-width: 480px; margin: 0 auto; }

      /* ---- Brautpaar-Header ---- */
      .hero {
        text-align: center;
        margin-bottom: 24px;
      }
      .couple-photo-wrap {
        position: relative;
        display: inline-block;
        margin-bottom: 18px;
      }
      .couple-photo {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #fff;
        box-shadow:
          0 0 0 1px var(--line),
          0 20px 40px -15px rgba(94, 72, 38, 0.35);
        background: var(--bg-2);
      }
      .couple-photo.placeholder {
        display: grid;
        place-items: center;
        font-family: 'Cormorant Garamond', serif;
        font-size: 56px;
        color: var(--accent);
        font-style: italic;
      }
      .ornament {
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        color: var(--accent);
        font-size: 16px;
        letter-spacing: 0.12em;
        margin-bottom: 4px;
      }
      .ornament::before, .ornament::after {
        content: '·';
        margin: 0 10px;
        opacity: 0.7;
      }
      h1 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-size: clamp(30px, 7.5vw, 42px);
        letter-spacing: 0.01em;
        margin: 0 0 10px;
        line-height: 1.1;
      }
      .welcome {
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.55;
        max-width: 360px;
        margin: 0 auto;
        white-space: pre-wrap;
      }
      .welcome.default {
        font-style: italic;
      }

      /* ---- Card ---- */
      .card {
        background: #fdfaf4;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 22px;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.8) inset,
          0 20px 50px -30px rgba(94, 72, 38, 0.35);
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--ink);
        letter-spacing: 0.02em;
      }
      input[type='text'], textarea {
        width: 100%;
        background: #fffdf7;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px 14px;
        font-family: inherit;
        font-size: 16px;
        color: var(--ink);
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input[type='text']:focus, textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(138, 106, 59, 0.15);
      }
      textarea { resize: none; min-height: 72px; }
      .field { margin-bottom: 16px; }
      .drop {
        border: 1.5px dashed var(--line);
        border-radius: 14px;
        padding: 26px 16px;
        text-align: center;
        background: #fffdf7;
        cursor: pointer;
        transition: all 0.2s;
      }
      .drop:hover, .drop.drag {
        border-color: var(--accent);
        background: #fffaed;
      }
      .drop-icon { font-size: 32px; margin-bottom: 8px; display: block; }
      .drop-text { font-size: 15px; color: var(--ink); }
      .drop-hint { font-size: 12px; color: var(--ink-soft); margin-top: 4px; }
      #file { display: none; }
      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 8px;
        margin-top: 14px;
      }
      .preview-item {
        position: relative;
        aspect-ratio: 1;
        border-radius: 8px;
        overflow: hidden;
        background: var(--bg-2);
      }
      .preview-item img { width: 100%; height: 100%; object-fit: cover; }
      .preview-item .rm {
        position: absolute;
        top: 4px; right: 4px;
        width: 22px; height: 22px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.6);
        color: #fff;
        border: none;
        font-size: 14px;
        line-height: 1;
        cursor: pointer;
        display: grid;
        place-items: center;
      }
      button.submit {
        width: 100%;
        margin-top: 18px;
        padding: 15px;
        background: var(--accent-deep);
        color: #fdfaf4;
        border: none;
        border-radius: 12px;
        font-family: 'Cormorant Garamond', serif;
        font-size: 20px;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 0.15s, transform 0.05s;
      }
      button.submit:hover:not(:disabled) { background: #4a3820; }
      button.submit:active { transform: scale(0.99); }
      button.submit:disabled { opacity: 0.6; cursor: not-allowed; }
      .progress {
        margin-top: 14px;
        height: 6px;
        background: var(--bg-2);
        border-radius: 999px;
        overflow: hidden;
        display: none;
      }
      .progress.show { display: block; }
      .progress-bar {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 0.2s;
      }
      .status {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 10px;
        font-size: 14px;
        display: none;
      }
      .status.show { display: block; }
      .status.ok {
        background: rgba(74, 122, 74, 0.12);
        color: var(--ok);
        border: 1px solid rgba(74, 122, 74, 0.25);
      }
      .status.err {
        background: rgba(163, 58, 58, 0.1);
        color: var(--err);
        border: 1px solid rgba(163, 58, 58, 0.25);
      }
      .success-panel { text-align: center; padding: 30px 10px 10px; }
      .success-panel .big {
        font-family: 'Cormorant Garamond', serif;
        font-size: 28px;
        font-style: italic;
        color: var(--accent-deep);
        margin-bottom: 8px;
      }
      .success-panel .small {
        color: var(--ink-soft);
        font-size: 14px;
        margin-bottom: 20px;
      }
      .ghost-btn {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink);
        padding: 10px 20px;
        border-radius: 10px;
        font-family: inherit;
        font-size: 14px;
        cursor: pointer;
      }
      .ghost-btn:hover { background: var(--bg-2); }

      /* ---- Foto-Challenge Karte ---- */
      .challenge {
        background: linear-gradient(135deg, #fffaed 0%, #fdf3dc 100%);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        position: relative;
        overflow: hidden;
      }
      .challenge::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top right, rgba(196, 162, 106, 0.15), transparent 60%);
        pointer-events: none;
      }
      .challenge .emoji {
        font-size: 28px;
        flex-shrink: 0;
        filter: drop-shadow(0 2px 4px rgba(94, 72, 38, 0.2));
      }
      .challenge .text {
        flex: 1;
        font-size: 14px;
        line-height: 1.35;
        color: var(--ink);
      }
      .challenge .text b {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 500;
        font-style: italic;
        color: var(--accent-deep);
        font-size: 15px;
        letter-spacing: 0.02em;
      }
      .challenge .refresh {
        background: none;
        border: none;
        color: var(--accent);
        font-size: 18px;
        cursor: pointer;
        padding: 4px;
        opacity: 0.7;
        transition: opacity 0.15s, transform 0.3s;
      }
      .challenge .refresh:hover { opacity: 1; }
      .challenge .refresh.spin { transform: rotate(360deg); }

      /* ---- Herz-Konfetti auf Success ---- */
      .hearts-burst {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 1000;
      }
      .hearts-burst .h {
        position: absolute;
        bottom: -40px;
        font-size: 28px;
        animation: heart-rise linear forwards;
        opacity: 0;
        user-select: none;
      }
      @keyframes heart-rise {
        0% {
          transform: translateY(0) translateX(0) scale(0.5) rotate(var(--r0));
          opacity: 0;
        }
        10% { opacity: 1; }
        50% {
          transform: translateY(-50vh) translateX(var(--drift)) scale(1) rotate(var(--r1));
        }
        100% {
          transform: translateY(-110vh) translateX(calc(var(--drift) * 2)) scale(1.1) rotate(var(--r2));
          opacity: 0;
        }
      }

      .pulse-heart {
        display: inline-block;
        font-size: 72px;
        color: #c6475d;
        line-height: 1;
        margin-bottom: 12px;
        filter: drop-shadow(0 10px 30px rgba(198, 71, 93, 0.4));
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <header class="hero">
        <div class="couple-photo-wrap">
          <img class="couple-photo" id="couplePhoto" alt="" style="display:none" />
          <div class="couple-photo placeholder" id="couplePlaceholder">&amp;</div>
        </div>
        <div class="ornament" id="ornament">mit Liebe geteilt</div>
        <h1 id="coupleNames">Eure Momente</h1>
        <p class="welcome default" id="welcome">
          Teilt eure schönsten Bilder von heute — sie erscheinen direkt auf unserer Fotowand.
        </p>
      </header>

      <div class="challenge" id="challenge">
        <div class="emoji" id="challengeEmoji">📸</div>
        <div class="text">
          <b>Foto-Idee</b><br />
          <span id="challengeText">Teilt einen besonderen Moment von heute.</span>
        </div>
        <button class="refresh" id="challengeRefresh" aria-label="Neue Idee" title="Neue Idee">↻</button>
      </div>

      <div class="card" id="form-card">
        <div class="field">
          <label for="name">Euer Name</label>
          <input id="name" type="text" placeholder="z. B. Anna & Tom" maxlength="60" />
        </div>

        <div class="field">
          <label for="message">Nachricht (optional)</label>
          <textarea
            id="message"
            placeholder="Ein kurzer Gruß für das Brautpaar…"
            maxlength="200"
          ></textarea>
        </div>

        <div class="field">
          <label>Fotos</label>
          <label class="drop" id="drop" for="file">
            <span class="drop-icon">📸</span>
            <span class="drop-text">Fotos auswählen</span>
            <span class="drop-hint">Mehrere gleichzeitig möglich</span>
          </label>
          <input id="file" type="file" accept="image/*" multiple />
          <div class="preview-grid" id="preview"></div>
        </div>

        <div class="progress" id="progress">
          <div class="progress-bar" id="bar"></div>
        </div>

        <div class="status" id="status"></div>

        <button class="submit" id="submit" disabled>Hochladen</button>
      </div>

      <div class="card success-panel" id="success-card" style="display: none">
        <div class="pulse-heart" aria-hidden="true">♥</div>
        <div class="big">Vielen Dank!</div>
        <div class="small" id="success-small">Euer Foto erscheint gleich auf der Fotowand.</div>
        <button class="ghost-btn" id="again">Noch eins hochladen</button>
        <div style="margin-top: 14px; font-size: 12px; color: var(--ink-soft);">
          <a id="statsLink" href="#" style="color: var(--accent-deep); text-decoration: none;">Statistik ansehen ›</a>
        </div>
      </div>
    </div>

    <div class="hearts-burst" id="heartsBurst" aria-hidden="true"></div>

    <script>
      // ---------- Slug aus Pfad /e/<slug> ----------
      const SLUG = ((location.pathname.match(/\/e\/([^\/?#]+)/) || [])[1] || '').toLowerCase();
      if (!SLUG) {
        document.body.innerHTML =
          '<div style="padding:60px 20px;text-align:center;font-family:serif;color:#5e4826">' +
          '<h2 style="font-style:italic">Event nicht gefunden</h2>' +
          '<p>Bitte scannt den QR-Code eurer Hochzeit erneut.</p></div>';
        throw new Error('Kein Slug in URL');
      }
      const statsLink = document.getElementById('statsLink');
      if (statsLink) statsLink.href = '/e/' + SLUG + '/stats';

      // ---------- Foto-Challenges: wechseln bei Klick auf ↻ ----------
      const CHALLENGES = [
        { e: '💃', t: 'Fotografiert die erste Tanz-Einlage — egal ob elegant oder peinlich.' },
        { e: '🥂', t: 'Ein Toast-Moment! Halte die Gläser hoch und klick!' },
        { e: '👰', t: 'Ein Selfie mit dem Brautpaar — jetzt oder nie!' },
        { e: '👞', t: 'Fotografiert die schönsten Schuhe des Abends.' },
        { e: '🎂', t: 'Torten-Moment: der erste Anschnitt in voller Schärfe.' },
        { e: '💐', t: 'Der Brautstrauß aus nächster Nähe — oder wer ihn fängt.' },
        { e: '😂', t: 'Der lustigste Gesichtsausdruck, den ihr heute seht.' },
        { e: '👫', t: 'Ein Foto mit euren Tisch-Nachbarn.' },
        { e: '🌅', t: 'Fangt die Stimmung der Location ein — Deko, Licht, Atmosphäre.' },
        { e: '👟', t: 'Schuhe aus, Tanzfläche frei! Fotografiert barfüßige Gäste.' },
        { e: '🎵', t: 'Der DJ / die Band in Aktion.' },
        { e: '🥰', t: 'Zwei Gäste, die sich gerade ganz fest umarmen.' },
        { e: '🍽️', t: 'Die schönste Vorspeise, der beste Hauptgang — Essen-Close-up!' },
        { e: '👶', t: 'Das jüngste (oder älteste) Gäst im Bild.' },
        { e: '💍', t: 'Die Ringe in Großaufnahme.' },
        { e: '🕺', t: 'Bester Tanzmove des Abends — haltet drauf!' },
        { e: '📷', t: 'Ein spontanes Gruppenfoto, das nicht gestellt ist.' },
        { e: '🌳', t: 'Geht raus und macht ein Foto in der Natur.' },
        { e: '✨', t: 'Der magischste Moment des Tages — ihr erkennt ihn.' },
        { e: '🎁', t: 'Das originellste Geschenk, das ihr entdecken könnt.' },
      ];
      let challengeIdx = Math.floor(Math.random() * CHALLENGES.length);
      const challengeEmoji = document.getElementById('challengeEmoji');
      const challengeText = document.getElementById('challengeText');
      const challengeRefresh = document.getElementById('challengeRefresh');
      function showChallenge() {
        const c = CHALLENGES[challengeIdx];
        challengeEmoji.textContent = c.e;
        challengeText.textContent = c.t;
      }
      showChallenge();
      challengeRefresh.addEventListener('click', () => {
        let next = Math.floor(Math.random() * CHALLENGES.length);
        if (next === challengeIdx) next = (next + 1) % CHALLENGES.length;
        challengeIdx = next;
        challengeRefresh.classList.remove('spin');
        void challengeRefresh.offsetWidth;
        challengeRefresh.classList.add('spin');
        showChallenge();
      });

      // ---------- Herz-Burst: steigt beim Upload-Erfolg auf ----------
      const heartsBurstEl = document.getElementById('heartsBurst');
      function burstHearts(count) {
        const hearts = ['♥', '♥', '♥', '❤️', '💖', '💕'];
        for (let i = 0; i < count; i++) {
          const h = document.createElement('span');
          h.className = 'h';
          h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          const startX = Math.random() * 100;
          const drift = (Math.random() - 0.5) * 120; // px
          const dur = 3 + Math.random() * 2.5; // Sek.
          const delay = Math.random() * 0.8;
          const size = 20 + Math.random() * 28;
          h.style.left = startX + 'vw';
          h.style.fontSize = size + 'px';
          h.style.animationDuration = dur + 's';
          h.style.animationDelay = delay + 's';
          h.style.setProperty('--drift', drift + 'px');
          h.style.setProperty('--r0', Math.random() * 30 - 15 + 'deg');
          h.style.setProperty('--r1', Math.random() * 60 - 30 + 'deg');
          h.style.setProperty('--r2', Math.random() * 120 - 60 + 'deg');
          heartsBurstEl.appendChild(h);
          setTimeout(() => h.remove(), (dur + delay + 0.5) * 1000);
        }
      }

      // ---------- Event-Einstellungen laden ----------
      (async function loadEventSettings() {
        try {
          const res = await fetch('/api/events/by-slug?slug=' + encodeURIComponent(SLUG), {
            cache: 'no-store',
          });
          if (!res.ok) {
            if (res.status === 404 || res.status === 403) {
              document.body.innerHTML =
                '<div style="padding:60px 20px;text-align:center;font-family:serif;color:#5e4826">' +
                '<h2 style="font-style:italic">Event nicht verfügbar</h2>' +
                '<p>Dieses Event ist nicht aktiv oder wurde nicht gefunden.</p></div>';
            }
            return;
          }
          const body = await res.json();
          const s = body.event || body;

          if (s.couple_photo_url) {
            const img = document.getElementById('couplePhoto');
            img.src = s.couple_photo_url;
            img.onload = () => {
              document.getElementById('couplePlaceholder').style.display = 'none';
              img.style.display = '';
            };
          }

          if (s.couple_names && s.couple_names.trim()) {
            document.getElementById('coupleNames').textContent = s.couple_names;
            document.getElementById('ornament').textContent = 'mit Liebe geteilt';
            document.title = s.couple_names + ' · Foto hochladen';
          }

          if (s.welcome_text && s.welcome_text.trim()) {
            const w = document.getElementById('welcome');
            w.textContent = s.welcome_text;
            w.classList.remove('default');
          }
        } catch (e) {
          console.warn('Event-Einstellungen nicht ladbar', e);
        }
      })();

      // ---------- Upload-Logik ----------
      const fileInput = document.getElementById('file');
      const drop = document.getElementById('drop');
      const preview = document.getElementById('preview');
      const submitBtn = document.getElementById('submit');
      const nameEl = document.getElementById('name');
      const msgEl = document.getElementById('message');
      const statusEl = document.getElementById('status');
      const progressEl = document.getElementById('progress');
      const barEl = document.getElementById('bar');
      const formCard = document.getElementById('form-card');
      const successCard = document.getElementById('success-card');
      const againBtn = document.getElementById('again');

      let queue = [];

      function render() {
        preview.innerHTML = '';
        queue.forEach((f, i) => {
          const url = URL.createObjectURL(f);
          const item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML =
            '<img src="' + url + '" alt=""><button class="rm" aria-label="Entfernen">×</button>';
          item.querySelector('.rm').onclick = (e) => {
            e.preventDefault();
            queue.splice(i, 1);
            render();
            updateBtn();
          };
          preview.appendChild(item);
        });
      }

      function updateBtn() {
        submitBtn.disabled = queue.length === 0;
        submitBtn.textContent =
          queue.length > 1 ? 'Hochladen (' + queue.length + ' Fotos)' : 'Hochladen';
      }

      function addFiles(files) {
        for (const f of files) if (f.type.startsWith('image/')) queue.push(f);
        render();
        updateBtn();
      }

      fileInput.addEventListener('change', (e) => addFiles(e.target.files));

      ['dragenter', 'dragover'].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.add('drag');
        })
      );
      ['dragleave', 'drop'].forEach((ev) =>
        drop.addEventListener(ev, (e) => {
          e.preventDefault();
          drop.classList.remove('drag');
        })
      );
      drop.addEventListener('drop', (e) => {
        if (e.dataTransfer?.files) addFiles(e.dataTransfer.files);
      });

      function showStatus(msg, kind) {
        statusEl.textContent = msg;
        statusEl.className = 'status show ' + kind;
      }
      function hideStatus() {
        statusEl.className = 'status';
      }

      async function uploadOne(file, sig, onProgress) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('api_key', sig.apiKey);
        fd.append('timestamp', sig.timestamp);
        fd.append('signature', sig.signature);
        fd.append('folder', sig.folder);
        fd.append('context', sig.context);

        return new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('POST', 'https://api.cloudinary.com/v1_1/' + sig.cloudName + '/image/upload');
          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) onProgress(e.loaded / e.total);
          };
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
            else reject(new Error('Upload fehlgeschlagen (' + xhr.status + ')'));
          };
          xhr.onerror = () => reject(new Error('Netzwerkfehler'));
          xhr.send(fd);
        });
      }

      submitBtn.addEventListener('click', async () => {
        if (queue.length === 0) return;
        hideStatus();
        submitBtn.disabled = true;
        submitBtn.textContent = 'Hochladen…';
        progressEl.classList.add('show');
        barEl.style.width = '0%';

        try {
          const sigRes = await fetch('/api/events/sign-upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              slug: SLUG,
              name: nameEl.value.trim(),
              message: msgEl.value.trim(),
              mode: 'guest',
            }),
          });
          if (!sigRes.ok) throw new Error('Server nicht erreichbar');
          const sig = await sigRes.json();

          const total = queue.length;
          for (let i = 0; i < total; i++) {
            await uploadOne(queue[i], sig, (p) => {
              const overall = ((i + p) / total) * 100;
              barEl.style.width = overall + '%';
            });
          }

          barEl.style.width = '100%';
          const uploaded = total;
          setTimeout(() => {
            formCard.style.display = 'none';
            document.getElementById('challenge').style.display = 'none';
            const smallEl = document.getElementById('success-small');
            smallEl.textContent =
              uploaded > 1
                ? 'Eure ' + uploaded + ' Fotos erscheinen gleich auf der Fotowand.'
                : 'Euer Foto erscheint gleich auf der Fotowand.';
            successCard.style.display = 'block';
            // Herz-Konfetti: mehr Herzen bei mehr Fotos
            burstHearts(Math.min(40, 14 + uploaded * 3));
          }, 300);
        } catch (err) {
          console.error(err);
          showStatus(
            'Das hat leider nicht geklappt: ' + err.message + '. Bitte noch einmal versuchen.',
            'err'
          );
          submitBtn.disabled = false;
          updateBtn();
          progressEl.classList.remove('show');
        }
      });

      againBtn.addEventListener('click', () => {
        queue = [];
        fileInput.value = '';
        render();
        updateBtn();
        progressEl.classList.remove('show');
        barEl.style.width = '0%';
        hideStatus();
        successCard.style.display = 'none';
        formCard.style.display = 'block';
        document.getElementById('challenge').style.display = '';
        // Neue Foto-Idee zeigen
        challengeIdx = (challengeIdx + 1 + Math.floor(Math.random() * 3)) % CHALLENGES.length;
        showChallenge();
      });
    </script>
  </body>
</html>
